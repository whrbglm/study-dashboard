<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Break Planner — Kyu</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f5f5f3;
    --text: #1a1a1a; --text-secondary: #666660;
    --border: rgba(0,0,0,0.12); --border-strong: rgba(0,0,0,0.25);
    --radius-md: 8px; --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0ede8; color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 900px; margin: 0 auto; }
  .page-header { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.5rem 1.75rem; margin-bottom: 1.25rem; }
  .page-header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .page-header p { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
  .goal-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.3px; }
  .chip-sat  { background:#EEEDFE; color:#3C3489; }
  .chip-bio  { background:#EAF3DE; color:#27500A; }
  .chip-chem { background:#FAEEDA; color:#633806; }
  .chip-econ { background:#FBEAF0; color:#72243E; }
  .chip-math { background:#E6F1FB; color:#0C447C; }
  .legend { background:var(--bg); border-radius:var(--radius-lg); border:0.5px solid var(--border); padding:1rem 1.75rem; margin-bottom:1.25rem; display:flex; flex-wrap:wrap; gap:14px; align-items:center; }
  .legend-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-secondary); }
  .leg-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-secondary); }
  .leg-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .week-nav { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:1.25rem; }
  .week-btn { padding:7px 14px; font-size:12px; font-weight:500; border:0.5px solid var(--border-strong); border-radius:var(--radius-md); background:var(--bg); color:var(--text-secondary); cursor:pointer; font-family:inherit; transition:all .15s; }
  .week-btn:hover { color:var(--text); }
  .week-btn.active { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }
  .week-view { display:none; }
  .week-view.active { display:block; }
  .week-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-secondary); margin-bottom:10px; padding-left:2px; }
  .days-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(115px,1fr)); gap:8px; margin-bottom:1.25rem; }
  .day-card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:10px 12px; cursor:pointer; transition:border-color .15s, box-shadow .15s; user-select:none; }
  .day-card:hover { border-color:var(--border-strong); }
  .day-card.active { border:1.5px solid #534AB7; box-shadow:0 0 0 3px rgba(83,74,183,.08); }
  .day-card.sunday { background:var(--bg-secondary); }
  .dc-date { font-size:10px; color:var(--text-secondary); margin-bottom:1px; }
  .dc-day  { font-size:14px; font-weight:600; margin-bottom:7px; }
  .dc-tags { display:flex; flex-wrap:wrap; gap:3px; }
  .tag { font-size:9px; font-weight:700; padding:2px 5px; border-radius:4px; letter-spacing:.2px; }
  .tag-sat    { background:#EEEDFE; color:#3C3489; }
  .tag-math   { background:#E6F1FB; color:#0C447C; }
  .tag-bio    { background:#EAF3DE; color:#27500A; }
  .tag-chem   { background:#FAEEDA; color:#633806; }
  .tag-econ   { background:#FBEAF0; color:#72243E; }
  .tag-rest   { background:#F1EFE8; color:#444441; }
  .tag-lesson { background:#FAECE7; color:#712B13; }
  .tag-fam    { background:#E1F5EE; color:#085041; }
  .tag-light  { background:#F5F0FF; color:#4B3580; }
  .daily-panel { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1.5rem 1.75rem; display:none; margin-bottom:1.25rem; }
  .daily-panel.active { display:block; }
  .panel-header { display:flex; align-items:center; gap:10px; margin-bottom:1.25rem; padding-bottom:12px; border-bottom:0.5px solid var(--border); flex-wrap:wrap; }
  .panel-title { font-size:17px; font-weight:600; }
  .panel-badge { font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; }
  .badge-lesson { background:#FAECE7; color:#712B13; }
  .badge-light  { background:#F1EFE8; color:#444441; }
  .badge-fam    { background:#E1F5EE; color:#085041; }
  .badge-double { background:#FFF0E0; color:#7A3D00; }
  .timeline { display:flex; flex-direction:column; }
  .block { display:grid; grid-template-columns:100px 1fr; gap:14px; padding:10px 0; border-bottom:0.5px solid var(--border); }
  .block:last-child { border-bottom:none; }
  .block-time { font-size:11px; font-weight:600; color:var(--text-secondary); padding-top:3px; line-height:1.5; }
  .block-dur  { font-size:10px; color:#aaa; font-weight:400; }
  .block-title { font-size:13px; font-weight:600; margin-bottom:5px; display:flex; align-items:center; gap:7px; }
  .block-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .dot-sat   { background:#7F77DD; }
  .dot-math  { background:#378ADD; }
  .dot-bio   { background:#639922; }
  .dot-chem  { background:#BA7517; }
  .dot-econ  { background:#D4537E; }
  .dot-free  { background:#888780; }
  .dot-sleep { background:#AFA9EC; }
  .dot-fam   { background:#1D9E75; }
  .todo-list { list-style:none; }
  .todo-list li { font-size:12px; color:var(--text-secondary); padding:2px 0; display:flex; align-items:flex-start; gap:7px; line-height:1.5; }
  .todo-list li::before { content:"→"; color:#bbb; flex-shrink:0; margin-top:1px; font-size:11px; }
  .todo-dur { color:#bbb; font-size:11px; flex-shrink:0; margin-left:auto; padding-left:8px; }
  @media(max-width:600px){
    body{padding:1rem .75rem;}
    .days-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;}
    .block{grid-template-columns:80px 1fr;gap:10px;}
    .daily-panel{padding:1rem 1.25rem;}
  }
</style>
</head>
<body>
<div class="container">

<div class="page-header">
  <h1>Summer break planner</h1>
  <p>June 15 – July 22, 2026 &nbsp;·&nbsp; SAT: Aug 22 &nbsp;·&nbsp; Predicted Grades: Sep 14</p>
  <div class="goal-chips">
    <span class="chip chip-sat">SAT 1550+ goal</span>
    <span class="chip chip-math">HL Math AA</span>
    <span class="chip chip-bio">Biology HL</span>
    <span class="chip chip-chem">Chemistry HL</span>
    <span class="chip chip-econ">Economics SL</span>
  </div>
</div>

<div class="legend">
  <span class="legend-label">Key</span>
  <div class="leg-item"><div class="leg-dot" style="background:#7F77DD"></div>SAT</div>
  <div class="leg-item"><div class="leg-dot" style="background:#378ADD"></div>Math</div>
  <div class="leg-item"><div class="leg-dot" style="background:#639922"></div>Biology</div>
  <div class="leg-item"><div class="leg-dot" style="background:#BA7517"></div>Chemistry</div>
  <div class="leg-item"><div class="leg-dot" style="background:#D4537E"></div>Economics</div>
  <div class="leg-item"><div class="leg-dot" style="background:#1D9E75"></div>Family time</div>
  <div class="leg-item"><div class="leg-dot" style="background:#888780"></div>Free / rest</div>
  <div class="leg-item"><div class="leg-dot" style="background:#AFA9EC"></div>Sleep</div>
</div>

<div class="week-nav" id="weekNav"></div>
<div id="weekViews"></div>
</div>

<script>
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug'];
function dateStr(d){ return `${d.getDate()} ${MONTHS[d.getMonth()]}`; }
function dayName(d){ return DAYS[d.getDay()]; }

const mathTopics = [
  'Algebra functions & roots','Quadratics','Exponentials & logarithms',
  'Graphs & transformations','Sequences & series','Complex numbers',
  'Permutation & combination','Binomial theorem','Remainder & factor theorem',
  'Mathematical induction','Radian & trigonometry','Matrices',
  'Vectors, lines & planes','Statistics','Probability',
  'Differentiation','Integration','Differential equations',
  'Kinematics & relative velocity','Revision: all topics'
];
const bioNew = [
  'CH3 Origins of cells (HL)','CH5 Viruses (HL)','CH6 Diversity of organisms',
  'CH7 Classification & cladistics (HL)','CH8 Evolution & speciation',
  'CH9 Conservation of biodiversity','CH15 Gas exchange','CH16 Transport',
  'CH17 Muscle & motility (HL)','CH18 Adaptation to environment',
  'CH19 Ecological niches','CH23 Chemical signaling (HL)',
  'CH35 Reproduction','CH37 Homeostasis','CH38 Natural selection',
  'CH39 Sustainability & change','CH40 Climate change'
];
const bioReview = [
  'CH1 Water','CH2 Nucleic acids','CH4 Cell structure',
  'CH10 Carbohydrates & lipids','CH11 Proteins','CH12 Membranes & transport',
  'CH13 Organelles','CH14 Cell specialization','CH20 Enzymes & metabolism',
  'CH21 Cell respiration','CH22 Photosynthesis','CH24 Neural signaling',
  'CH25 Body systems integration','CH26 Defence against disease',
  'CH27 Populations & communities','CH28 Transfer of energy & matter',
  'CH29 DNA replication','CH30 Protein synthesis','CH31 Mutations & gene editing',
  'CH32 Cell & nuclear division','CH33 Gene expression (HL)',
  'CH34 Water potential','CH36 Inheritance'
];
const chemNew = [
  'CH15 Energy from fuels','CH16 Entropy & spontaneity (AHL)',
  'CH17 Amount of chemical change','CH18 Rate of chemical change',
  'CH19 Extent of chemical change','CH20 Proton transfer reactions',
  'CH21 Electron transfer reactions','CH22 Electron sharing reactions',
  'CH23 Electron-pair sharing reactions'
];
const chemReview = [
  'CH1–3 Matter, nuclear atom, electron config','CH4–5 Mole & ideal gases',
  'CH6–8 Ionic, covalent, metallic models','CH9–10 Materials & periodic table',
  'CH11 Functional groups','CH12–14 Enthalpy & energy cycles'
];
const macroTopics = [
  '3.1 Measuring economic activity (GDP, GNI, business cycle)',
  '3.2 AD/AS models — shifts, equilibrium, gaps',
  '3.3 Macroeconomic objectives — growth, unemployment, inflation, debt',
  '3.4 Inequality & poverty — Lorenz curve, Gini, taxation',
  '3.5 Monetary policy — tools, money creation (HL), effectiveness',
  '3.6 Fiscal & supply-side policies — multiplier (HL), effectiveness'
];
const econNew = ['CH3 International economics','CH4 Development economics'];

const start = new Date(2026,5,15);
const end   = new Date(2026,6,22);

function isSunday(d)   { return d.getDay()===0; }
function isSaturday(d) { return d.getDay()===6; }
function isMonday(d)   { return d.getDay()===1; }
function isThursday(d) { return d.getDay()===4; }
function isFriday(d)   { return d.getDay()===5; }

function hasLessonThu(d){ return isThursday(d) && d<=new Date(2026,5,18); }
function hasLessonSat(d){ return isSaturday(d); }
function hasLessonMon(d){ return isMonday(d) && d>=new Date(2026,5,22); }

function getWeeks(){
  let weeks=[],d=new Date(start);
  while(d<=end){
    let w=[];
    for(let i=0;i<7;i++){ if(d<=end){ w.push(new Date(d)); } d.setDate(d.getDate()+1); }
    weeks.push(w);
  }
  return weeks;
}

// Helper: build a todo item with duration
function td(text, dur){ return {text, dur}; }

function getDayPlan(d){
  const dayN   = Math.floor((d-start)/86400000);
  const cycle4 = dayN%4;
  const mT  = mathTopics[dayN%mathTopics.length];
  const bN  = bioNew[dayN%bioNew.length];
  const bR  = bioReview[dayN%bioReview.length];
  const cN  = chemNew[dayN%chemNew.length];
  const cR  = chemReview[dayN%chemReview.length];
  const eM  = macroTopics[dayN%macroTopics.length];
  const eI  = econNew[dayN%econNew.length];

  const sun        = isSunday(d);
  const fri        = isFriday(d);
  const sat        = isSaturday(d);
  const familyNight = fri||sat||sun;
  const lessonThu  = hasLessonThu(d);
  const lessonSat  = hasLessonSat(d);
  const lessonMon  = hasLessonMon(d);
  const bootcamp   = !sun;
  // double-duty day = bootcamp + evening lesson
  const heavyDouble = bootcamp && (lessonThu||lessonMon);

  let B=[];

  // ── SLEEP ──────────────────────────────────────────────
  B.push({time:'12am – 7am', dur:'7 hrs', dot:'dot-sleep', title:'Sleep', todos:[
    td('Full 7-hour sleep block','7 hrs'),
    td('No screens 30 min before bed','—')
  ]});

  // ── 7am: SAT Morning ───────────────────────────────────
  B.push({time:'7:00 – 8:00am', dur:'1 hr', dot:'dot-sat', title:'SAT morning block', todos:[
    td('Wake up, hydrate, freshen up','10 min'),
    td('Read 2 SAT Reading passages — annotate actively (OnePrep / Bluebook)','25 min'),
    td('Vocabulary drill — 15 new words from word list','15 min'),
    td('Quick scan of yesterday\'s error log','10 min')
  ]});

  // ── 8am: BREAKFAST ─────────────────────────────────────
  B.push({time:'8:00 – 9:00am', dur:'1 hr', dot:'dot-free', title:'Breakfast + get ready', todos:[
    td('Sit-down breakfast — no screens','30 min'),
    td('Get ready, pack notes / materials','20 min'),
    td('Head to bootcamp / settle at desk','10 min')
  ]});

  // ── 9–11am: BOOTCAMP or REST ───────────────────────────
  if(!sun){
    B.push({time:'9:00 – 11:00am', dur:'2 hrs', dot:'dot-math', title:'Math bootcamp', todos:[
      td('Attend bootcamp session — full focus','2 hrs'),
      td('Complete all in-class problems, no skipping','—'),
      td('Flag any unclear concept with a star for later','—'),
      td('Note all homework or assignments given','—')
    ]});
  } else {
    B.push({time:'9:00 – 11:00am', dur:'2 hrs', dot:'dot-free', title:'Rest & light review (Sunday)', todos:[
      td('Light walk or stretch / exercise','30 min'),
      td('Passively flip through bio or chem notes (optional)','30 min'),
      td('Free time — no heavy study obligation','1 hr')
    ]});
  }

  // ── POST-BOOTCAMP: heavy-double vs normal ──────────────
  if(heavyDouble){
    // LIGHTER DAY — bootcamp + evening lesson
    B.push({time:'11:00am – 12:00pm', dur:'1 hr', dot:'dot-sat', title:'SAT vocab + light review', todos:[
      td('SAT Vocabulary: quiz yourself on yesterday\'s 15 words','15 min'),
      td('Learn 15 new vocabulary words from word list','20 min'),
      td(cycle4<=1 ? `Light read-through: ${bN} (BioNinja — no notes required)` : `Light read-through: ${cN} (skim headings & key terms only)`,'20 min'),
      td('Rest — stretch, hydrate, take a short walk','5 min')
    ]});

    B.push({time:'12:00 – 1:00pm', dur:'1 hr', dot:'dot-free', title:'Lunch', todos:[
      td('Sit-down lunch — no screens','45 min'),
      td('Short walk outside or rest','15 min')
    ]});

    B.push({time:'1:00 – 2:30pm', dur:'1.5 hrs', dot:'dot-sat', title:'SAT practice (light)', todos:[
      td('SAT Reading: 1 passage set — annotate every question (Bluebook)','25 min'),
      td('Review all answers, note each rule broken','15 min'),
      td('SAT Writing: 10 grammar Qs from question bank','20 min'),
      td('SAT Math: 10 practice Qs (Bluebook question bank)','25 min'),
      td('Update error log with today\'s mistakes','5 min')
    ]});

    B.push({time:'2:30 – 4:00pm', dur:'1.5 hrs', dot: cycle4<=1 ? 'dot-bio':'dot-chem',
      title: cycle4<=1 ? 'Biology — active recall (light)':'Chemistry — active recall (light)', todos:[
      td(cycle4<=1 ? `Active recall: ${bR} — brain dump on blank paper` : `Active recall: ${cR} — write all key equations from memory`,'20 min'),
      td('Check against notes, highlight only the gaps','15 min'),
      td(cycle4<=1 ? 'Do 5 past paper Qs on this topic' : 'Draw 1–2 key diagrams (e.g. energy profile, titration curve)','30 min'),
      td('Rest — you have a lesson tonight, conserve energy','25 min')
    ]});

    B.push({time:'4:00 – 6:00pm', dur:'2 hrs', dot:'dot-free', title:'Free time + rest before lesson', todos:[
      td('Full break — no study','1.5 hrs'),
      td('Prepare any questions to bring to math lesson','15 min'),
      td('Light snack, hydrate','15 min')
    ]});

    B.push({time:'6:00 – 7:00pm', dur:'1 hr', dot:'dot-free', title:'Dinner', todos:[
      td('Sit-down dinner — no screens','45 min'),
      td('Relax, chat — do not rush','15 min')
    ]});

    if(lessonThu){
      B.push({time:'7:00 – 8:00pm', dur:'1 hr', dot:'dot-free', title:'Free time before lesson', todos:[
        td('Rest fully — light walk, music, whatever relaxes you','1 hr')
      ]});
      B.push({time:'8:00 – 9:30pm', dur:'1.5 hrs', dot:'dot-math', title:'Math lesson (until Jun 18)', todos:[
        td('Attend math lesson — full focus, no distractions','1.5 hrs'),
        td('Take detailed notes on every worked example','—'),
        td('Write down all homework or exercises assigned','—')
      ]});
      B.push({time:'9:30 – 11:00pm', dur:'1.5 hrs', dot:'dot-free', title:'Wind down', todos:[
        td('Review lesson notes briefly — 1 pass only','15 min'),
        td('SAT vocab: glance over today\'s 15 words one more time','10 min'),
        td('Prepare tomorrow\'s to-do list','10 min'),
        td('Screens off, wind down to sleep','55 min')
      ]});
    } else if(lessonMon){
      B.push({time:'7:00 – 8:30pm', dur:'1.5 hrs', dot:'dot-free', title:'Free time before lesson', todos:[
        td('Full break — do not study','1.5 hrs')
      ]});
      // Mon lesson starts 6:30 but dinner is 6, so lesson at 6:30 — adjust
      // Actually Mon lesson 6:30–8pm, dinner 6pm clashes — dinner moved slightly
      // Re-route: dinner 5:30, lesson 6:30
      // But instructions say dinner at 6pm fixed. So: dinner 6–6:30 quick, lesson 6:30
      B.push({time:'6:30 – 8:00pm', dur:'1.5 hrs', dot:'dot-math', title:'Math lesson (from Jun 22)', todos:[
        td('Attend math lesson — full focus','1.5 hrs'),
        td('Take notes on every worked example','—'),
        td('Write down all homework assigned','—')
      ]});
      B.push({time:'8:00 – 9:30pm', dur:'1.5 hrs', dot:'dot-sat', title:'SAT light review', todos:[
        td('SAT Math: 10 Qs from Bluebook question bank','25 min'),
        td('Review lesson notes — 1 pass','15 min'),
        td('Vocabulary quiz: today\'s 15 words','10 min'),
        td('Update error log','5 min'),
        td('Wind down — prepare tomorrow\'s to-do','5 min')
      ]});
      B.push({time:'9:30 – 12:00am', dur:'2.5 hrs', dot:'dot-free', title:'Wind down + sleep prep', todos:[
        td('No new study material','—'),
        td('Screens off by 11:30pm','—')
      ]});
    }

  } else if(sun){
    // ── SUNDAY ──────────────────────────────────────────
    B.push({time:'11:00am – 12:00pm', dur:'1 hr', dot:'dot-free', title:'Free time', todos:[
      td('Fully unstructured — rest, hobby, social','1 hr')
    ]});
    B.push({time:'12:00 – 1:00pm', dur:'1 hr', dot:'dot-free', title:'Lunch', todos:[
      td('Sit-down lunch — no screens','45 min'),
      td('Rest or short walk','15 min')
    ]});
    B.push({time:'1:00 – 2:30pm', dur:'1.5 hrs', dot:'dot-sat', title:'SAT practice', todos:[
      td('Full SAT Reading & Writing module — Bluebook (35 min timed)','35 min'),
      td('Mark and review every wrong answer — note rule broken','25 min'),
      td('Vocabulary quiz: yesterday\'s 15 words','10 min'),
      td('Learn 15 new vocabulary words','10 min')
    ]});
    B.push({time:'2:30 – 4:30pm', dur:'2 hrs', dot:'dot-free', title:'Free time', todos:[
      td('Fully unstructured — social, hobby, rest','2 hrs')
    ]});
    B.push({time:'4:30 – 6:00pm', dur:'1.5 hrs', dot:'dot-math', title:'Math self-study', todos:[
      td(`Topic: ${mT} — work through textbook examples`,'45 min'),
      td('Do 8–10 past paper Qs on this topic','35 min'),
      td('Review any bootcamp notes from this week','10 min')
    ]});
    B.push({time:'6:00 – 7:00pm', dur:'1 hr', dot:'dot-free', title:'Dinner', todos:[
      td('Sit-down dinner with family — no screens','1 hr')
    ]});
    B.push({time:'7:00 – 8:30pm', dur:'1.5 hrs', dot: cycle4<=1?'dot-bio':'dot-chem',
      title: cycle4<=1?'Biology — active recall':'Chemistry — active recall', todos:[
      td(cycle4<=1 ? `Active recall: ${bR} — brain dump on blank paper` : `Active recall: ${cR} — write all key equations from memory`,'20 min'),
      td('Check against notes, mark gaps only','10 min'),
      td(cycle4<=1 ? `Study: ${bN} — read BioNinja + make skeleton notes` : `Study: ${cN} — read textbook + list key equations`,'50 min'),
      td('Do 5–6 past paper Qs','10 min')
    ]});
    B.push({time:'8:30 – 10:30pm', dur:'2 hrs', dot:'dot-fam', title:'Family time', todos:[
      td('Protected family time — no study, no books','2 hrs'),
      td('Put devices away and be present','—')
    ]});
    B.push({time:'10:30pm – 12:00am', dur:'1.5 hrs', dot:'dot-free', title:'Wind down', todos:[
      td('Light vocab card review (optional)','10 min'),
      td('Prepare tomorrow\'s to-do list','10 min'),
      td('Screens off by 11:30pm, sleep by 12am','—')
    ]});

  } else {
    // ── NORMAL WEEKDAY (Mon-Sat, no heavy double) ────────

    // 11am–12pm science part 1
    if(cycle4<=1){
      B.push({time:'11:00am – 12:00pm', dur:'1 hr', dot:'dot-bio', title:`Biology — ${bN} (Part 1)`, todos:[
        td(`Read BioNinja page for: ${bN}`,'25 min'),
        td('Read corresponding textbook section','20 min'),
        td('Write skeleton headings from memory after reading','10 min'),
        td('Flag any diagrams or definitions to revisit after lunch','5 min')
      ]});
    } else {
      B.push({time:'11:00am – 12:00pm', dur:'1 hr', dot:'dot-chem', title:`Chemistry — ${cN} (Part 1)`, todos:[
        td(`Read Steve Owen textbook: ${cN}`,'30 min'),
        td('List all key equations & definitions from memory after reading','15 min'),
        td('Note all gaps to address after lunch','10 min'),
        td('Flag any diagrams (energy profiles, reaction curves, etc.)','5 min')
      ]});
    }

    // LUNCH
    B.push({time:'12:00 – 1:00pm', dur:'1 hr', dot:'dot-free', title:'Lunch', todos:[
      td('Sit-down lunch — no screens','45 min'),
      td('Short walk outside or power nap (max 20 min)','15 min')
    ]});

    // 1–2:30pm science part 2
    if(cycle4<=1){
      B.push({time:'1:00 – 2:30pm', dur:'1.5 hrs', dot:'dot-bio', title:`Biology — ${bN} (Part 2) + active recall`, todos:[
        td('Complete skeleton notes from memory — no peeking','15 min'),
        td('Do 10–12 past paper Qs on this topic','40 min'),
        td(`Active recall: ${bR} — brain dump on blank paper`,'15 min'),
        td('Check brain dump against notes, highlight gaps only','10 min'),
        td('Re-do any skeleton headings you blanked on','10 min')
      ]});
    } else {
      B.push({time:'1:00 – 2:30pm', dur:'1.5 hrs', dot:'dot-chem', title:`Chemistry — ${cN} (Part 2) + active recall`, todos:[
        td('Write all key equations from memory — no notes','15 min'),
        td('Do 10–12 past paper Qs on this topic','40 min'),
        td(`Active recall: ${cR} — write key equations + draw diagrams`,'15 min'),
        td('Check against notes, mark every gap','10 min'),
        td('Redo 2–3 questions you got wrong','10 min')
      ]});
    }

    B.push({time:'2:30 – 3:00pm', dur:'30 min', dot:'dot-free', title:'Break', todos:[
      td('Step away from desk completely','15 min'),
      td('Snack, hydrate, short walk','15 min')
    ]});

    // 3–5pm: Economics + SAT (or SAT block if Thu post-lesson)
    if(isThursday(d) && !lessonThu){
      // Thu post-June-18: no lesson, full afternoon
      B.push({time:'3:00 – 4:00pm', dur:'1 hr', dot:'dot-econ', title:`Economics — ${eM}`, todos:[
        td(`Study: ${eM} — textbook + annotate all key diagrams`,'35 min'),
        td('Write 4–5 bullet summary from memory after reading','10 min'),
        td('Do 2–3 past paper short-answer Qs','15 min')
      ]});
      B.push({time:'4:00 – 5:30pm', dur:'1.5 hrs', dot:'dot-sat', title:'SAT practice', todos:[
        td('SAT Reading: 2 passage sets — annotate every question (OnePrep / Bluebook)','30 min'),
        td('Review all answers, note rule broken for each error','15 min'),
        td('SAT Writing: 15 grammar Qs from question bank','20 min'),
        td('SAT Math: 15 Qs from Bluebook question bank','25 min'),
        td('Vocabulary: 15 new words from word list','10 min')
      ]});
    } else if(lessonSat){
      // Saturday: bootcamp 9–11 + sat lesson 10–11:30 already covered by bootcamp
      // afternoon: econ + SAT
      B.push({time:'3:00 – 4:00pm', dur:'1 hr', dot:'dot-econ', title:`Economics — ${eM}`, todos:[
        td(`Study: ${eM}`,'30 min'),
        td('Annotate key diagrams + write 3-bullet summary','15 min'),
        td(`New topic: ${eI} — read 1 section`,'15 min')
      ]});
      B.push({time:'4:00 – 5:30pm', dur:'1.5 hrs', dot:'dot-sat', title:'SAT practice', todos:[
        td('SAT Math: 1 module from Bluebook (timed, 35 min)','35 min'),
        td('SAT Reading: 1 passage set — annotate fully','20 min'),
        td('Vocabulary: 15 new words + quiz prior batch','15 min'),
        td('Error log: note every mistake + rule broken','10 min')
      ]});
    } else if(cycle4===0){
      B.push({time:'3:00 – 4:00pm', dur:'1 hr', dot:'dot-econ', title:`Economics — ${eM}`, todos:[
        td(`Study: ${eM} — textbook reading + annotate diagrams`,'35 min'),
        td('Write 3–5 bullet summary from memory','10 min'),
        td('Do 2 past paper short-answer Qs','15 min')
      ]});
      B.push({time:'4:00 – 5:30pm', dur:'1.5 hrs', dot:'dot-sat', title:'SAT practice', todos:[
        td('SAT Reading: 2 passage sets (OnePrep / Bluebook)','30 min'),
        td('Review answers — note every rule broken','15 min'),
        td('SAT Writing: 10–15 grammar Qs','20 min'),
        td('Vocabulary: 15 new words from word list','15 min'),
        td('Update error log','10 min')
      ]});
    } else if(cycle4===3){
      B.push({time:'3:00 – 4:00pm', dur:'1 hr', dot:'dot-econ', title:`Economics — new: ${eI}`, todos:[
        td(`Study: ${eI} — read textbook section carefully`,'35 min'),
        td('Summarise into 5 bullet points + 1 key diagram from memory','15 min'),
        td('Do 2 past paper Qs','10 min')
      ]});
      B.push({time:'4:00 – 5:30pm', dur:'1.5 hrs', dot:'dot-sat', title:'SAT practice', todos:[
        td('SAT Reading: 2 passage sets (annotate actively)','30 min'),
        td('Review all answers thoroughly','15 min'),
        td('SAT Writing: 10 grammar Qs','15 min'),
        td('SAT Math: 10 Qs from Bluebook','20 min'),
        td('Vocabulary: 15 new words + quiz prior batch','10 min')
      ]});
    } else {
      // cycle4 === 1 or 2 — SAT heavier, no econ
      B.push({time:'3:00 – 5:00pm', dur:'2 hrs', dot:'dot-sat', title:'SAT practice (extended)', todos:[
        td('SAT Math: 1 full module — timed (Bluebook, 35 min)','35 min'),
        td('SAT Reading: 2 passage sets (OnePrep / Bluebook)','30 min'),
        td('Review all answers — note every rule broken','20 min'),
        td('SAT Writing: 15 grammar Qs from question bank','20 min'),
        td('Vocabulary: 15 new words from word list','10 min'),
        td('Update error log','5 min')
      ]});
    }

    B.push({time:'5:30 – 6:00pm', dur:'30 min', dot:'dot-free', title:'Break before dinner', todos:[
      td('Step away from desk, light stretch','15 min'),
      td('Prep for dinner / help set table','15 min')
    ]});

    // DINNER 6pm
    if(lessonMon){
      // Mon lesson 6:30–8pm — quick dinner then lesson
      B.push({time:'6:00 – 6:30pm', dur:'30 min', dot:'dot-free', title:'Dinner (quick — lesson at 6:30)', todos:[
        td('Quick dinner — eat properly, don\'t skip','25 min'),
        td('Pack notes for math lesson','5 min')
      ]});
      B.push({time:'6:30 – 8:00pm', dur:'1.5 hrs', dot:'dot-math', title:'Math lesson (from Jun 22)', todos:[
        td('Attend math lesson — full focus','1.5 hrs'),
        td('Take detailed notes on every worked example','—'),
        td('Write down all homework assigned','—')
      ]});
      if(fri){
        // Fri+lesson Mon doesn't overlap but just in case
        B.push({time:'8:00 – 8:30pm', dur:'30 min', dot:'dot-sat', title:'SAT quick review', todos:[
          td('SAT Math: 8–10 Qs from Bluebook','20 min'),
          td('Vocabulary: quiz today\'s 15 words','10 min')
        ]});
        B.push({time:'8:30 – 10:30pm', dur:'2 hrs', dot:'dot-fam', title:'Family time', todos:[
          td('Protected family time — no study, no books','2 hrs'),
          td('Put devices away, be fully present','—')
        ]});
      } else {
        B.push({time:'8:00 – 9:30pm', dur:'1.5 hrs', dot:'dot-sat', title:'SAT + math review (light)', todos:[
          td('SAT Math: 12 Qs from Bluebook question bank','25 min'),
          td('Review lesson notes — 1 pass','15 min'),
          td('Vocabulary quiz: today\'s 15 words','10 min'),
          td('Update error log','5 min'),
          td('Prepare tomorrow\'s to-do list','5 min')
        ]});
        B.push({time:'9:30pm – 12:00am', dur:'2.5 hrs', dot:'dot-free', title:'Wind down', todos:[
          td('No new study material','—'),
          td('Light vocab card review (optional)','10 min'),
          td('Screens off by 11:30pm','—')
        ]});
      }
      return B;
    }

    B.push({time:'6:00 – 7:00pm', dur:'1 hr', dot:'dot-free', title:'Dinner', todos:[
      td('Sit-down dinner — no screens','1 hr')
    ]});

    // EVENING
    if(fri||sat){
      // Family night: math before 8:30, family 8:30–10:30
      B.push({time:'7:00 – 8:30pm', dur:'1.5 hrs', dot:'dot-math',
        title: sat ? 'Math bootcamp HW + review' : 'Math — bootcamp HW + self-study', todos:[
        td('Complete any bootcamp homework or assignments first','30 min'),
        td(`Self-study: ${mT} — work through textbook examples`,'35 min'),
        td('Do 6–8 practice Qs from past papers','20 min'),
        td(sat ? 'Review Saturday lesson notes' : 'Flag any remaining questions for bootcamp','5 min')
      ]});
      B.push({time:'8:30 – 10:30pm', dur:'2 hrs', dot:'dot-fam', title:'Family time', todos:[
        td('Protected family time — no study, no books','2 hrs'),
        td('Put all devices and notes away','—'),
        td('Be fully present with family','—')
      ]});
      B.push({time:'10:30pm – 12:00am', dur:'1.5 hrs', dot:'dot-free', title:'Wind down', todos:[
        td('Light vocabulary card review (optional)','10 min'),
        td('Prepare tomorrow\'s to-do list','10 min'),
        td('Screens off by 11:30pm, sleep by 12am','—')
      ]});
    } else {
      // Normal weekday evening (Mon post-lesson handled above, Tue–Thu non-lesson)
      B.push({time:'7:00 – 8:30pm', dur:'1.5 hrs', dot:'dot-math', title:'Math — bootcamp HW + self-study', todos:[
        td('Complete all bootcamp homework or assignments','30 min'),
        td(`Self-study: ${mT} — textbook examples`,'35 min'),
        td('Do 6–8 past paper Qs on this topic','20 min'),
        td('Mark solutions and flag any errors','5 min')
      ]});
      B.push({time:'8:30 – 10:00pm', dur:'1.5 hrs', dot:'dot-sat', title:'SAT evening session', todos:[
        td('SAT Math: 15 Qs from Bluebook question bank','25 min'),
        td('SAT Reading: 1 passage with full annotation','20 min'),
        td('Vocabulary: review today\'s 15 words + quiz yourself','10 min'),
        td('Update error log with today\'s mistakes','5 min')
      ]});
      B.push({time:'10:00pm – 12:00am', dur:'2 hrs', dot:'dot-free', title:'Wind down', todos:[
        td('No new study material','—'),
        td('Light vocab card review (optional)','10 min'),
        td('Prepare tomorrow\'s to-do list','10 min'),
        td('Screens off by 11:30pm, sleep by 12am','—')
      ]});
    }
  }

  return B;
}

function getTags(d){
  const dayN = Math.floor((d-start)/86400000);
  const cycle4 = dayN%4;
  const lessonThu = hasLessonThu(d), lessonSat=hasLessonSat(d), lessonMon=hasLessonMon(d);
  const heavyDouble = !isSunday(d) && (lessonThu||lessonMon);
  let tags=[];
  if(!isSunday(d)) tags.push({cls:'tag-math',label:'Math'});
  tags.push({cls:'tag-sat',label:'SAT'});
  if(cycle4<=1) tags.push({cls:'tag-bio',label:'Bio'});
  else tags.push({cls:'tag-chem',label:'Chem'});
  if(cycle4===0||cycle4===3) tags.push({cls:'tag-econ',label:'Econ'});
  if(lessonThu||lessonSat||lessonMon) tags.push({cls:'tag-lesson',label:'Lesson'});
  if(heavyDouble) tags.push({cls:'tag-light',label:'Light day'});
  if(isSunday(d)) tags.push({cls:'tag-rest',label:'Rest'});
  if(isFriday(d)||isSaturday(d)||isSunday(d)) tags.push({cls:'tag-fam',label:'Family'});
  return tags;
}

function buildUI(){
  const weeks=getWeeks();
  const nav=document.getElementById('weekNav');
  const views=document.getElementById('weekViews');

  weeks.forEach((week,wi)=>{
    const btn=document.createElement('button');
    btn.className='week-btn'+(wi===0?' active':'');
    const ws=week[0],we=week[week.length-1];
    btn.textContent=`Week ${wi+1}: ${dateStr(ws)} – ${dateStr(we)}`;
    btn.onclick=()=>{
      document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.week-view').forEach(v=>v.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('wv'+wi).classList.add('active');
    };
    nav.appendChild(btn);

    const wv=document.createElement('div');
    wv.className='week-view'+(wi===0?' active':'');
    wv.id='wv'+wi;

    const wl=document.createElement('div');
    wl.className='week-label';
    wl.textContent=`Week ${wi+1}`;
    wv.appendChild(wl);

    const grid=document.createElement('div');
    grid.className='days-grid';
    const panels=document.createElement('div');

    week.forEach((day,di)=>{
      const id=`day-${wi}-${di}`;
      const card=document.createElement('div');
      card.className='day-card'+(isSunday(day)?' sunday':'');
      card.innerHTML=`<div class="dc-date">${dateStr(day)}</div><div class="dc-day">${dayName(day)}</div><div class="dc-tags">${getTags(day).map(t=>`<span class="tag ${t.cls}">${t.label}</span>`).join('')}</div>`;
      card.onclick=()=>{
        wv.querySelectorAll('.day-card').forEach(c=>c.classList.remove('active'));
        wv.querySelectorAll('.daily-panel').forEach(p=>p.classList.remove('active'));
        card.classList.add('active');
        const panel=document.getElementById(id+'-panel');
        panel.classList.add('active');
        panel.scrollIntoView({behavior:'smooth',block:'nearest'});
      };
      grid.appendChild(card);

      const plan=getDayPlan(day);
      const lessonDay=hasLessonThu(day)||hasLessonSat(day)||hasLessonMon(day);
      const heavyDouble=!isSunday(day)&&(hasLessonThu(day)||hasLessonMon(day));
      const famNight=isFriday(day)||isSaturday(day)||isSunday(day);

      const panel=document.createElement('div');
      panel.className='daily-panel';
      panel.id=id+'-panel';
      panel.innerHTML=`
        <div class="panel-header">
          <div class="panel-title">${dayName(day)}, ${dateStr(day)}</div>
          ${isSunday(day)?'<span class="panel-badge badge-light">Rest day</span>':''}
          ${heavyDouble?'<span class="panel-badge badge-double">Bootcamp + lesson — lighter day</span>':''}
          ${lessonDay&&!heavyDouble?'<span class="panel-badge badge-lesson">Lesson day</span>':''}
          ${famNight?'<span class="panel-badge badge-fam">Family 8:30–10:30pm</span>':''}
        </div>
        <div class="timeline">
          ${plan.map(b=>`
            <div class="block">
              <div class="block-time">${b.time}<br><span class="block-dur">${b.dur}</span></div>
              <div>
                <div class="block-title"><span class="block-dot ${b.dot}"></span>${b.title}</div>
                <ul class="todo-list">${b.todos.map(t=>`<li><span>${t.text}</span><span class="todo-dur">${t.dur}</span></li>`).join('')}</ul>
              </div>
            </div>
          `).join('')}
        </div>`;
      panels.appendChild(panel);
    });

    wv.appendChild(grid);
    wv.appendChild(panels);
    views.appendChild(wv);
  });
}

buildUI();
</script>
