<!DOCTYPE html>
<html>
<head>
  <title>Study Dashboard</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    section {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      border-radius: 16px;
      max-width: 700px;
    }

    input {
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
      width: 100%;
      background: #0f172a;
      color: white;
    }

    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
      margin-top: 5px;
    }

    li {
      list-style: none;
      background: #0f172a;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>📊 Study Dashboard</h1>

<section>
  <h2>📌 Planner</h2>
  <input id="taskInput" placeholder="Task">
  <button onclick="addTask()">Add Task</button>
  <ul id="taskList"></ul>
</section>

<section>
  <h2>📝 Past Papers</h2>
  <input id="ppSubject" placeholder="Subject">
  <input id="ppTime" placeholder="Minutes">
  <button onclick="addPaper()">Add</button>
  <ul id="paperList"></ul>
</section>

<section>
  <h2>🧠 Flashcards</h2>
  <input id="fcQ" placeholder="Question">
  <input id="fcA" placeholder="Answer">
  <button onclick="addFlashcard()">Add</button>
  <ul id="flashList"></ul>
</section>

<section>
  <h2>🔥 Hard Questions</h2>
  <input id="hqText" placeholder="Question">
  <button onclick="addHQ()">Add</button>
  <ul id="hqList"></ul>
</section>

<script>

// TASKS
function addTask(){
  let text = taskInput.value;
  let li = document.createElement("li");
  li.textContent = text;

  li.onclick = () => li.style.textDecoration = "line-through";

  taskList.appendChild(li);
  save();
}

// PAST PAPERS
function addPaper(){
  let sub = ppSubject.value;
  let time = ppTime.value;

  let li = document.createElement("li");
  li.textContent = sub + " - " + time + " min";

  paperList.appendChild(li);
  save();
}

// FLASHCARDS
let flashcards = JSON.parse(localStorage.getItem("flashcards") || "[]");

function addFlashcard(){
  flashcards.push({
    question: fcQ.value,
    answer: fcA.value,
    interval: 1,
    ease: 2.5,
    due: Date.now()
  });

  saveFlash();
  renderFlash();
}

function renderFlash(){
  flashList.innerHTML = "";

  let now = Date.now();

  flashcards.forEach((c,i)=>{
    if(c.due <= now){
      let li = document.createElement("li");
      li.textContent = c.question;

      li.onclick = () => li.textContent = c.answer;

      ["Again","Hard","Easy"].forEach((t,idx)=>{
        let b = document.createElement("button");
        b.textContent = t;
        b.onclick = () => review(i, idx);
        li.appendChild(b);
      });

      flashList.appendChild(li);
    }
  });
}

function review(i,r){
  let c = flashcards[i];

  if(r === 0) c.interval = 1;
  if(r === 1) c.interval *= 1.5;
  if(r === 2){
    c.interval *= c.ease;
    c.ease += 0.15;
  }

  c.due = Date.now() + c.interval * 86400000;

  saveFlash();
  renderFlash();
}

function saveFlash(){
  localStorage.setItem("flashcards", JSON.stringify(flashcards));
}

// HARD QUESTIONS
function addHQ(){
  let li = document.createElement("li");
  li.textContent = hqText.value;

  hqList.appendChild(li);
  save();
}

// SAVE
function save(){
  localStorage.setItem("tasks", taskList.innerHTML);
  localStorage.setItem("papers", paperList.innerHTML);
  localStorage.setItem("hq", hqList.innerHTML);
}

function load(){
  taskList.innerHTML = localStorage.getItem("tasks") || "";
  paperList.innerHTML = localStorage.getItem("papers") || "";
  hqList.innerHTML = localStorage.getItem("hq") || "";
}

load();
renderFlash();

</script>

</body>
</html>
