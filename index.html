<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Break Planner — Kyu</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --text: #1a1a1a;
    --text-secondary: #666660;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.25);
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0ede8;
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  .page-header {
    background: var(--bg);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 1.5rem 1.75rem;
    margin-bottom: 1.25rem;
  }

  .page-header h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text);
  }

  .page-header p {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }

  .goal-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }
  .chip-sat  { background: #EEEDFE; color: #3C3489; }
  .chip-bio  { background: #EAF3DE; color: #27500A; }
  .chip-chem { background: #FAEEDA; color: #633806; }
  .chip-econ { background: #FBEAF0; color: #72243E; }
  .chip-math { background: #E6F1FB; color: #0C447C; }

  .legend {
    background: var(--bg);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 1rem 1.75rem;
    margin-bottom: 1.25rem;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
  }

  .legend-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    margin-right: 4px;
  }

  .leg-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .leg-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .week-nav {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  .week-btn {
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 500;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .week-btn:hover { color: var(--text); border-color: var(--border-strong); }
  .week-btn.active {
    background: #1a1a1a;
    color: #ffffff;
    border-color: #1a1a1a;
  }

  .week-view { display: none; }
  .week-view.active { display: block; }

  .week-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-secondary);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  .day-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    user-select: none;
  }

  .day-card:hover { border-color: var(--border-strong); }

  .day-card.active {
    border: 1.5px solid #534AB7;
    box-shadow: 0 0 0 3px rgba(83,74,183,0.08);
  }

  .day-card.sunday { background: var(--bg-secondary); }

  .dc-date { font-size: 10px; color: var(--text-secondary); margin-bottom: 1px; }
  .dc-day  { font-size: 14px; font-weight: 600; margin-bottom: 7px; color: var(--text); }

  .dc-tags { display: flex; flex-wrap: wrap; gap: 3px; }

  .tag {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 4px;
    letter-spacing: 0.2px;
  }

  .tag-sat  { background: #EEEDFE; color: #3C3489; }
  .tag-math { background: #E6F1FB; color: #0C447C; }
  .tag-bio  { background: #EAF3DE; color: #27500A; }
  .tag-chem { background: #FAEEDA; color: #633806; }
  .tag-econ { background: #FBEAF0; color: #72243E; }
  .tag-rest { background: #F1EFE8; color: #444441; }
  .tag-lesson { background: #FAECE7; color: #712B13; }
  .tag-fam   { background: #E1F5EE; color: #085041; }

  .daily-panel {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem 1.75rem;
    display: none;
    margin-bottom: 1.25rem;
  }

  .daily-panel.active { display: block; }

  .panel-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 1.25rem;
    padding-bottom: 12px;
    border-bottom: 0.5px solid var(--border);
  }

  .panel-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .panel-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .badge-lesson { background: #FAECE7; color: #712B13; }
  .badge-light  { background: #F1EFE8; color: #444441; }

  .timeline { display: flex; flex-direction: column; }

  .block {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
  }

  .block:last-child { border-bottom: none; }

  .block-time {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    padding-top: 3px;
    line-height: 1.4;
  }

  .block-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 7px;
    color: var(--text);
  }

  .block-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-sat   { background: #7F77DD; }
  .dot-math  { background: #378ADD; }
  .dot-bio   { background: #639922; }
  .dot-chem  { background: #BA7517; }
  .dot-econ  { background: #D4537E; }
  .dot-free  { background: #888780; }
  .dot-sleep { background: #AFA9EC; }

  .todo-list { list-style: none; }

  .todo-list li {
    font-size: 12px;
    color: var(--text-secondary);
    padding: 2px 0;
    display: flex;
    align-items: flex-start;
    gap: 7px;
    line-height: 1.5;
  }

  .todo-list li::before {
    content: "→";
    color: #aaa;
    flex-shrink: 0;
    margin-top: 1px;
    font-size: 11px;
  }

  @media (max-width: 600px) {
    body { padding: 1rem 0.75rem; }
    .days-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; }
    .block { grid-template-columns: 75px 1fr; gap: 10px; }
    .daily-panel { padding: 1rem 1.25rem; }
    .page-header { padding: 1.25rem; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <h1>Summer break planner</h1>
    <p>June 15 – July 22, 2026 &nbsp;·&nbsp; SAT: Aug 22 &nbsp;·&nbsp; Predicted Grades Exam: Sep 14</p>
    <div class="goal-chips">
      <span class="chip chip-sat">SAT 1550+ goal</span>
      <span class="chip chip-math">HL Math AA</span>
      <span class="chip chip-bio">Biology HL</span>
      <span class="chip chip-chem">Chemistry HL</span>
      <span class="chip chip-econ">Economics SL</span>
    </div>
  </div>

  <div class="legend">
    <span class="legend-label">Key</span>
    <div class="leg-item"><div class="leg-dot" style="background:#7F77DD"></div>SAT</div>
    <div class="leg-item"><div class="leg-dot" style="background:#378ADD"></div>Math</div>
    <div class="leg-item"><div class="leg-dot" style="background:#639922"></div>Biology</div>
    <div class="leg-item"><div class="leg-dot" style="background:#BA7517"></div>Chemistry</div>
    <div class="leg-item"><div class="leg-dot" style="background:#D4537E"></div>Economics</div>
    <div class="leg-item"><div class="leg-dot" style="background:#888780"></div>Free / rest</div>
    <div class="leg-item"><div class="leg-dot" style="background:#AFA9EC"></div>Sleep</div>
  <div class="leg-item"><div class="leg-dot" style="background:#1D9E75"></div>Family time</div>
  </div>

  <div class="week-nav" id="weekNav"></div>
  <div id="weekViews"></div>

</div>

<script>
const DAYS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug'];
function dateStr(d){ return `${d.getDate()} ${MONTHS[d.getMonth()]}`; }
function dayName(d){ return DAYS[d.getDay()]; }

const mathTopics = [
  'Algebra functions & roots','Quadratics','Exponentials & logarithms',
  'Graphs & transformations','Sequences & series','Complex numbers',
  'Permutation & combination','Binomial theorem','Remainder & factor theorem',
  'Mathematical induction','Radian & trigonometry','Matrices',
  'Vectors, lines & planes','Statistics','Probability',
  'Differentiation','Integration','Differential equations',
  'Kinematics & relative velocity','Revision: all topics'
];

const bioNew = [
  'CH3 Origins of cells (HL)','CH5 Viruses (HL)','CH6 Diversity of organisms',
  'CH7 Classification & cladistics (HL)','CH8 Evolution & speciation',
  'CH9 Conservation of biodiversity','CH15 Gas exchange','CH16 Transport',
  'CH17 Muscle & motility (HL)','CH18 Adaptation to environment',
  'CH19 Ecological niches','CH23 Chemical signaling (HL)',
  'CH35 Reproduction','CH37 Homeostasis','CH38 Natural selection',
  'CH39 Sustainability & change','CH40 Climate change'
];

const bioReview = [
  'CH1 Water','CH2 Nucleic acids','CH4 Cell structure',
  'CH10 Carbohydrates & lipids','CH11 Proteins','CH12 Membranes & transport',
  'CH13 Organelles','CH14 Cell specialization','CH20 Enzymes & metabolism',
  'CH21 Cell respiration','CH22 Photosynthesis','CH24 Neural signaling',
  'CH25 Body systems integration','CH26 Defence against disease',
  'CH27 Populations & communities','CH28 Transfer of energy & matter',
  'CH29 DNA replication','CH30 Protein synthesis','CH31 Mutations & gene editing',
  'CH32 Cell & nuclear division','CH33 Gene expression (HL)',
  'CH34 Water potential','CH36 Inheritance'
];

const chemNew = [
  'CH15 Energy from fuels','CH16 Entropy & spontaneity (AHL)',
  'CH17 Amount of chemical change','CH18 Rate of chemical change',
  'CH19 Extent of chemical change','CH20 Proton transfer reactions',
  'CH21 Electron transfer reactions','CH22 Electron sharing reactions',
  'CH23 Electron-pair sharing reactions'
];

const chemReview = [
  'CH1–3 Matter, nuclear atom, electron config','CH4–5 Mole & ideal gases',
  'CH6–8 Ionic, covalent, metallic models','CH9–10 Materials & periodic table',
  'CH11 Functional groups','CH12–14 Enthalpy & energy cycles'
];

const macroTopics = [
  '3.1 Measuring economic activity (GDP, GNI, business cycle)',
  '3.2 AD/AS models — shifts, equilibrium, gaps',
  '3.3 Macroeconomic objectives — growth, unemployment, inflation, debt',
  '3.4 Inequality & poverty — Lorenz curve, Gini, taxation',
  '3.5 Monetary policy — tools, money creation (HL), effectiveness',
  '3.6 Fiscal & supply-side policies — multiplier (HL), effectiveness'
];

const econNew = ['CH3 International economics','CH4 Development economics'];

const start = new Date(2026, 5, 15);
const end   = new Date(2026, 6, 22);

function isSunday(d)   { return d.getDay() === 0; }
function isSaturday(d) { return d.getDay() === 6; }
function isMonday(d)   { return d.getDay() === 1; }
function isThursday(d) { return d.getDay() === 4; }

function hasLessonThu(d){ return isThursday(d) && d <= new Date(2026,5,18); }
function hasLessonSat(d){ return isSaturday(d); }
function hasLessonMon(d){ return isMonday(d) && d >= new Date(2026,5,22); }

function getWeeks(){
  let weeks = [], d = new Date(start);
  while(d <= end){
    let w = [];
    for(let i=0;i<7;i++){
      if(d<=end){ w.push(new Date(d)); }
      d.setDate(d.getDate()+1);
    }
    weeks.push(w);
  }
  return weeks;
}

function getDayPlan(d){
  const dayN    = Math.floor((d - start) / 86400000);
  const cycle4  = dayN % 4;
  const mTopic  = mathTopics[dayN % mathTopics.length];
  const bNewT   = bioNew[dayN % bioNew.length];
  const bRevT   = bioReview[dayN % bioReview.length];
  const cNewT   = chemNew[dayN % chemNew.length];
  const cRevT   = chemReview[dayN % chemReview.length];
  const eT      = macroTopics[dayN % macroTopics.length];
  const intlT   = econNew[dayN % econNew.length];

  const lessonThu = hasLessonThu(d);
  const lessonSat = hasLessonSat(d);
  const lessonMon = hasLessonMon(d);
  const sun       = isSunday(d);
  const fri       = d.getDay() === 5;
  const sat       = isSaturday(d);
  const familyNight = fri || sat || sun;

  // bootcamp + lesson on same day = lighter day
  const bootcampDay = !sun;
  const heavyDouble = bootcampDay && (lessonThu || lessonMon);

  let blocks = [];

  // SLEEP
  blocks.push({time:'12am – 7am', dot:'dot-sleep', title:'Sleep',
    todos:['Full 7-hour sleep block','No screens 30 min before bed']});

  // MORNING: 7–8am SAT reading, 8am breakfast
  blocks.push({time:'7am – 8am', dot:'dot-sat', title:'Morning routine + SAT reading',
    todos:[
      '7:00 Wake up, hydrate',
      '7:10 Read 2 SAT Reading passages (OnePrep or Bluebook)',
      '7:40 Vocabulary drill — 15 new words from word list',
      '7:55 Quick review of yesterday\'s SAT error log'
    ]});

  blocks.push({time:'8am – 9am', dot:'dot-free', title:'Breakfast + get ready',
    todos:[
      '8:00 Sit-down breakfast — no screens',
      '8:30 Get ready, pack notes for bootcamp',
      '8:55 Head to bootcamp'
    ]});

  // BOOTCAMP or rest
  if(!sun){
    blocks.push({time:'9am – 11am', dot:'dot-math', title:'Math bootcamp',
      todos:[
        'Attend bootcamp session',
        'Complete all in-class problems fully',
        'Flag any unclear concepts for later review',
        'Note any homework or assignment given'
      ]});
  } else {
    blocks.push({time:'9am – 11am', dot:'dot-free', title:'Rest & light review',
      todos:[
        'Light walk or exercise (30 min)',
        'Optional: passively flip through biology / chemistry notes',
        'No heavy study — this is a reset block'
      ]});
  }

  // 11–12 block
  if(heavyDouble){
    // lighter: just a break + light SAT vocab before lunch
    blocks.push({time:'11am – 12pm', dot:'dot-sat', title:'Light SAT vocab + break',
      todos:[
        'Review today\'s 15 vocabulary words (20 min)',
        'Quiz yourself on last batch of words',
        'Rest — stretch, hydrate, step outside briefly'
      ]});
  } else if(sun){
    blocks.push({time:'11am – 12pm', dot:'dot-free', title:'Free time',
      todos:['Fully unstructured — rest, hobby, social','No study obligation']});
  } else {
    // normal study block before lunch
    if(cycle4===0||cycle4===1){
      blocks.push({time:'11am – 12pm', dot:'dot-bio', title:'Biology — new topic (part 1)',
        todos:[
          `Study: ${bNewT}`,
          'Read BioNinja page + textbook section (40 min)',
          'Write skeleton headings from memory after reading',
          'Note any diagrams or definitions to revisit'
        ]});
    } else {
      blocks.push({time:'11am – 12pm', dot:'dot-chem', title:'Chemistry — new topic (part 1)',
        todos:[
          `Study: ${cNewT}`,
          'Read Steve Owen textbook section (40 min)',
          'List all key equations & definitions from memory',
          'Highlight any gaps to address after lunch'
        ]});
    }
  }

  // LUNCH at 12pm
  blocks.push({time:'12pm – 1pm', dot:'dot-free', title:'Lunch',
    todos:['Sit-down lunch — no screens','Full rest, step away from desk','Short walk or nap optional (max 20 min)']});

  // AFTERNOON block
  if(sun){
    blocks.push({time:'1pm – 2:30pm', dot:'dot-sat', title:'SAT practice',
      todos:[
        'Full SAT Reading & Writing module (35 min) — Bluebook',
        'Mark and review every wrong answer carefully',
        'Note grammar / reading rule broken for each error',
        'Vocabulary quiz: yesterday\'s 15 words'
      ]});
    blocks.push({time:'2:30pm – 4pm', dot:'dot-free', title:'Free time',
      todos:['Fully unstructured','Social, rest, hobby']});
  } else if(heavyDouble){
    // lighter afternoon — just SAT reading + one subject at reduced load
    blocks.push({time:'1pm – 2pm', dot:'dot-sat', title:'SAT reading practice (light)',
      todos:[
        '1 SAT Reading passage set — Bluebook or OnePrep',
        'Annotate and review all answers',
        'Note any grammar rules or reading strategies missed'
      ]});
    blocks.push({time:'2pm – 3pm', dot:'dot-bio', title:'Light subject review',
      todos:[
        cycle4===0||cycle4===1 ? `Quick active recall: ${bRevT}` : `Quick active recall: ${cRevT}`,
        'Brain dump on blank paper for 10 min — no notes',
        'Check against notes, mark any gaps only',
        'No new content today — just consolidation'
      ]});
    blocks.push({time:'3pm – 4pm', dot:'dot-free', title:'Break + free time',
      todos:['Full break before evening lesson','Rest, light walk, snack']});
  } else if(lessonSat){
    blocks.push({time:'1pm – 2:30pm', dot:'dot-econ', title:'Economics',
      todos:[
        `Macroeconomics review: ${eT}`,
        'Summarise key concepts + label key diagrams',
        'Do 2–3 past paper short-answer Qs',
        `New topic: ${intlT} — read 1 section`
      ]});
    blocks.push({time:'2:30pm – 3pm', dot:'dot-free', title:'Break',
      todos:['Short break, hydrate, snack']});
    blocks.push({time:'3pm – 4:30pm', dot:'dot-sat', title:'SAT practice',
      todos:[
        'SAT Math: 1 module from Bluebook (35 min)',
        'SAT Reading: 1 passage set with full annotation',
        'Vocabulary: 15 new words + review prior set',
        'Error log: note every mistake + rule broken'
      ]});
  } else {
    // normal afternoon study
    if(cycle4===0||cycle4===1){
      blocks.push({time:'1pm – 2:30pm', dot:'dot-bio', title:'Biology — new topic (part 2)',
        todos:[
          `Continue: ${bNewT}`,
          'Complete skeleton notes from memory (15 min)',
          'Do 10–12 past paper Qs on this topic (45 min)',
          `Active recall: ${bRevT} — brain dump then check notes`
        ]});
    } else {
      blocks.push({time:'1pm – 2:30pm', dot:'dot-chem', title:'Chemistry — new topic (part 2)',
        todos:[
          `Continue: ${cNewT}`,
          'Write all key equations from memory (15 min)',
          'Do 10–12 past paper Qs on this topic (45 min)',
          `Active recall: ${cRevT}`
        ]});
    }
    blocks.push({time:'2:30pm – 3pm', dot:'dot-free', title:'Break',
      todos:['Step away from desk','Snack, hydrate']});

    if(isThursday(d) && !lessonThu){
      blocks.push({time:'3pm – 4pm', dot:'dot-econ', title:'Economics',
        todos:[
          `Macroeconomics review: ${eT}`,
          'Draw and label all key diagrams from memory',
          'Do 2–3 past paper short-answer Qs',
          `New topic: ${intlT} — read 1 section`
        ]});
      blocks.push({time:'4pm – 5:30pm', dot:'dot-sat', title:'SAT practice',
        todos:[
          'SAT Reading: 2 passage sets (annotate actively)',
          'SAT Writing: 15 grammar Qs from Bluebook question bank',
          'Vocabulary: 15 new words + quiz prior batch',
          'Error log update'
        ]});
    } else if(cycle4===0){
      blocks.push({time:'3pm – 4:30pm', dot:'dot-econ', title:'Economics — macroeconomics',
        todos:[
          `Study: ${eT}`,
          'Textbook reading + annotate key diagrams (40 min)',
          'Write 3–5 bullet summary from memory after',
          'Do 2 past paper short-answer Qs'
        ]});
      blocks.push({time:'4:30pm – 5:30pm', dot:'dot-sat', title:'SAT practice',
        todos:[
          'SAT Reading: 1 passage set (OnePrep or Bluebook)',
          'SAT Writing: 10 grammar Qs',
          'Vocabulary quiz: today\'s 15 words'
        ]});
    } else {
      blocks.push({time:'3pm – 4:30pm', dot:'dot-sat', title:'SAT practice',
        todos:[
          'SAT Reading: 2 passage sets (OnePrep or Bluebook)',
          'SAT Writing: 10–15 grammar Qs',
          'Vocabulary: 15 new words + quiz prior batch',
          'Log all errors in error journal'
        ]});
      blocks.push({time:'4:30pm – 5:30pm', dot:'dot-econ', title:'Economics — new content',
        todos:[
          `Study: ${intlT}`,
          'Read textbook section carefully (35 min)',
          'Summarise into 5 bullet points + 1 key diagram',
          'Do 1–2 past paper Qs'
        ]});
    }
  }

  // DINNER at 6pm — universal
  blocks.push({time:'6pm – 7pm', dot:'dot-free', title:'Dinner',
    todos:['Sit-down dinner with family','No screens, no study','Full rest']});

  // EVENING blocks
  if(lessonThu){
    // Thu lesson 8–9:30pm, lighter evening
    blocks.push({time:'7pm – 8pm', dot:'dot-free', title:'Free time before lesson',
      todos:['Rest, light walk','Prep any questions for math lesson','No heavy study']});
    blocks.push({time:'8pm – 9:30pm', dot:'dot-math', title:'Math lesson',
      todos:[
        'Attend math lesson (until June 18)',
        'Take detailed notes on all worked examples',
        'Mark all solutions clearly',
        'Write down any homework assigned'
      ]});
    blocks.push({time:'9:30pm – 11pm', dot:'dot-sat', title:'SAT light review',
      todos:[
        'SAT Vocab: review today\'s 15 words (10 min)',
        'SAT Math: 10 practice Qs only — don\'t overload',
        'Update error log briefly',
        'Wind down — prepare tomorrow\'s to-do'
      ]});
  } else if(lessonSat){
    // Sat: family time 8:30–10:30pm, so math HW before 8:30
    blocks.push({time:'7pm – 8:30pm', dot:'dot-math', title:'Math bootcamp HW + review',
      todos:[
        'Complete any bootcamp homework or assignments',
        `Self-study: ${mTopic}`,
        'Do 6–8 practice Qs on this topic',
        'Review Saturday lesson notes'
      ]});
    blocks.push({time:'8:30pm – 10:30pm', dot:'dot-free', title:'Family time',
      todos:['Protected family time — no study','Put away books and devices','Be present']});
  } else if(lessonMon){
    // Mon lesson 6:30–8pm, lighter evening
    blocks.push({time:'7pm – 8pm', dot:'dot-free', title:'Free time after lesson',
      todos:['Decompress after lesson','Light walk or rest','Prepare tomorrow\'s materials']});
    blocks.push({time:'8pm – 9:30pm', dot:'dot-sat', title:'SAT + math review (light)',
      todos:[
        'SAT Math: 10–12 Qs from Bluebook (35 min)',
        'Review lesson notes briefly (15 min)',
        'Vocabulary quiz: today\'s 15 words'
      ]});
    blocks.push({time:'9:30pm – 11pm', dot:'dot-free', title:'Wind down',
      todos:['No new study material','Prepare tomorrow\'s plan','Screens off by 11pm']});
  } else if(fri){
    // Friday: family time 8:30–10:30pm
    blocks.push({time:'7pm – 8:30pm', dot:'dot-math', title:'Math — bootcamp HW + self-study',
      todos:[
        'Complete any homework / assignment from morning bootcamp',
        `Self-study: ${mTopic}`,
        'Do 6–8 practice Qs from textbook or past papers'
      ]});
    blocks.push({time:'8:30pm – 10:30pm', dot:'dot-free', title:'Family time',
      todos:['Protected family time — no study','Put away books and devices','Be present']});
  } else if(sun){
    // Sunday: family time 8:30–10:30pm
    blocks.push({time:'7pm – 8:30pm', dot:'dot-math', title:'Math self-study',
      todos:[
        `Topic: ${mTopic}`,
        'Work through textbook examples (45 min)',
        'Do 6–8 past paper Qs',
        'Review bootcamp notes from this week'
      ]});
    blocks.push({time:'8:30pm – 10:30pm', dot:'dot-free', title:'Family time',
      todos:['Protected family time — no study','Put away books and devices','Be present']});
  } else {
    // Normal weekday evening
    blocks.push({time:'7pm – 8:30pm', dot:'dot-math', title:'Math — bootcamp HW + self-study',
      todos:[
        'Complete any homework / assignment from morning bootcamp',
        `Self-study: ${mTopic}`,
        'Do 6–8 practice Qs from textbook or past papers'
      ]});
    blocks.push({time:'8:30pm – 10pm', dot:'dot-sat', title:'SAT evening session',
      todos:[
        'SAT Math: 15 Qs from Bluebook question bank',
        'SAT Reading: 1 passage with full annotation',
        'Vocabulary: review today\'s 15 words + quiz',
        'Update error log'
      ]});
    blocks.push({time:'10pm – 12am', dot:'dot-free', title:'Wind down',
      todos:[
        'No new study material',
        'Light vocab card review optional',
        'Prepare tomorrow\'s schedule / to-do',
        'Screens off by 11:30pm'
      ]});
    return blocks;
  }

  // Wind down for family-night days and lesson days
  blocks.push({time:'10:30pm – 12am', dot:'dot-free', title:'Wind down',
    todos:[
      'No new study material',
      'Light vocab card review optional',
      'Prepare tomorrow\'s schedule / to-do',
      'Screens off by 11:30pm'
    ]});

  return blocks;
}

function getTags(d){
  const dayN = Math.floor((d - start) / 86400000);
  const cycle4 = dayN % 4;
  let tags = [];
  if(!isSunday(d)) tags.push({cls:'tag-math', label:'Math'});
  tags.push({cls:'tag-sat', label:'SAT'});
  if(cycle4===0||cycle4===1) tags.push({cls:'tag-bio', label:'Bio'});
  else tags.push({cls:'tag-chem', label:'Chem'});
  if(cycle4===0||cycle4===3) tags.push({cls:'tag-econ', label:'Econ'});
  if(hasLessonThu(d)||hasLessonSat(d)||hasLessonMon(d)) tags.push({cls:'tag-lesson', label:'Lesson'});
  if(isSunday(d)) tags.push({cls:'tag-rest', label:'Light'});
  if(d.getDay()===5||d.getDay()===6||d.getDay()===0) tags.push({cls:'tag-fam', label:'Family'});
  return tags;
}

function buildUI(){
  const weeks = getWeeks();
  const nav   = document.getElementById('weekNav');
  const views = document.getElementById('weekViews');

  weeks.forEach((week, wi) => {
    const wBtn = document.createElement('button');
    wBtn.className = 'week-btn' + (wi===0?' active':'');
    const wStart = week[0], wEnd = week[week.length-1];
    wBtn.textContent = `Week ${wi+1}: ${dateStr(wStart)} – ${dateStr(wEnd)}`;
    wBtn.onclick = () => {
      document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.week-view').forEach(v=>v.classList.remove('active'));
      wBtn.classList.add('active');
      document.getElementById('wv'+wi).classList.add('active');
    };
    nav.appendChild(wBtn);

    const wView = document.createElement('div');
    wView.className = 'week-view' + (wi===0?' active':'');
    wView.id = 'wv'+wi;

    const wLabel = document.createElement('div');
    wLabel.className = 'week-label';
    wLabel.textContent = `Week ${wi+1}`;
    wView.appendChild(wLabel);

    const grid = document.createElement('div');
    grid.className = 'days-grid';

    const panelContainer = document.createElement('div');

    week.forEach((day, di) => {
      const dayId = `day-${wi}-${di}`;

      const card = document.createElement('div');
      card.className = 'day-card' + (isSunday(day)?' sunday':'');
      card.innerHTML = `
        <div class="dc-date">${dateStr(day)}</div>
        <div class="dc-day">${dayName(day)}</div>
        <div class="dc-tags">${getTags(day).map(t=>`<span class="tag ${t.cls}">${t.label}</span>`).join('')}</div>
      `;
      card.onclick = () => {
        wView.querySelectorAll('.day-card').forEach(c=>c.classList.remove('active'));
        wView.querySelectorAll('.daily-panel').forEach(p=>p.classList.remove('active'));
        card.classList.add('active');
        const panel = document.getElementById(dayId+'-panel');
        panel.classList.add('active');
        panel.scrollIntoView({behavior:'smooth', block:'nearest'});
      };
      grid.appendChild(card);

      const plan = getDayPlan(day);
      const isLesson = hasLessonThu(day)||hasLessonSat(day)||hasLessonMon(day);

      const panel = document.createElement('div');
      panel.className = 'daily-panel';
      panel.id = dayId+'-panel';
      panel.innerHTML = `
        <div class="panel-header">
          <div class="panel-title">${dayName(day)}, ${dateStr(day)}</div>
          ${isSunday(day) ? '<span class="panel-badge badge-light">Light day</span>' : ''}
          ${isLesson ? '<span class="panel-badge badge-lesson">Lesson day</span>' : ''}
        </div>
        <div class="timeline">
          ${plan.map(b => `
            <div class="block">
              <div class="block-time">${b.time}</div>
              <div>
                <div class="block-title"><span class="block-dot ${b.dot}"></span>${b.title}</div>
                <ul class="todo-list">${b.todos.map(t=>`<li>${t}</li>`).join('')}</ul>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      panelContainer.appendChild(panel);
    });

    wView.appendChild(grid);
    wView.appendChild(panelContainer);
    views.appendChild(wView);
  });
}

buildUI();
</script>
